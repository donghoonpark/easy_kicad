name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: uv sync --locked --group dev

      - name: Run pytest
        run: uv run pytest

      - name: Build Python package
        run: uv build

  desktop-bundles:
    name: Desktop bundle (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: windows-2025
            target: windows-x64
          - os: macos-15
            target: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python dependencies
        run: uv sync --locked --group dev

      - name: Build desktop bundle
        run: uv run pyinstaller easy_kicad.spec --noconfirm

      - name: Pack release archive
        run: uv run python scripts/build_release.py

      - name: Build Windows debug bundle
        if: matrix.target == 'windows-x64'
        env:
          EASY_KICAD_BUILD_VARIANT: debug
        run: uv run pyinstaller easy_kicad.spec --noconfirm --distpath dist-debug --workpath build-debug

      - name: Pack Windows debug archive
        if: matrix.target == 'windows-x64'
        run: uv run python scripts/build_release.py --dist-dir dist-debug/easy_kicad_debug --variant debug

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: easy_kicad-${{ matrix.target }}
          path: release/*
          if-no-files-found: error
